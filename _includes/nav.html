<header>
  <nav class="navbar navbar-expand-lg bg-dark border-bottom py-3">
    <div class="container">

      <!-- Brand: avatar + site title -->
      <a class="navbar-brand d-flex align-items-center gap-2" href="{{ site.baseurl }}/">
        <img
          src="{{ site.baseurl }}/assets/img/avatar.png"
          alt="{{ site.title | escape }} icon"
          class="border"
          width="36"
          height="36">
        <span class="fs-4">{{ site.title }}</span>
      </a>

      <!-- Hamburger toggle (mobile only) -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Nav links -->
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-0 gap-md-1">
          {% for item in site.data.nav %}
            {% if item.url %}
              {% assign item_url = site.baseurl | append: item.url %}
              <li class="nav-item">
                <a class="nav-link px-2 py-2" href="{{ item_url }}">{{ item.title }}</a>
              </li>
            {% endif %}
          {% endfor %}
        </ul>
      </div>

    </div>
  </nav>
</header>
