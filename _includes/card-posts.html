<div class="col-12 col-sm-6 col-md-4 col-lg-3 d-flex align-items-stretch card-shadow-wrap card-post">
  <div class="card">
    <div class="card-header text-center bg-dark">
      <svg class="icon icon-4x" aria-hidden="true"><use href="#icon-{{ item.icon }}"></use></svg>
    </div>
    <div class="card-body">
      <h2 class="card-title h4">
        <a href="{{ site.baseurl }}{{ item.url }}" class="stretched-link">{{ item.title }}</a>
      </h2>
    </div>
    <div class="card-footer">
      <small>{{ item.date | date: "%B %-d, %Y" }}</small>
    </div>
  </div>
</div>
