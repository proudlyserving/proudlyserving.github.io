<div class="col-12 col-sm-6 col-md-4 col-lg-3 d-flex align-items-stretch card-shadow-wrap card-contents">
  <div class="card text-center rounded-0 bg-dark w-100">
    <div class="card-body">
      <svg class="icon icon-3x" aria-hidden="true"><use href="#icon-{{ item.icon }}"></use></svg>

      {% if page.layout == "profile" %}
        <h3 class="h5">
          <a href="{{ site.baseurl }}{{ item.url }}" class="stretched-link">{{ item.title }}</a>
        </h3>
      {% else %}
        <h4 class="h5">
          <a href="{{ site.baseurl }}{{ item.url }}" class="stretched-link">{{ item.title }}</a>
        </h4>
      {% endif %}

    </div>
  </div>
</div>
