<p class="social mt-4">
  {% assign data = author_data | default: page %}

  {% if data.website %}
    <a href="{{ data.website }}" aria-label="Website">
      <i class="fas fa-window-maximize fa-2x"></i>
    </a>
  {% endif %}

  {% if data.linkedin %}
    <a href="{{ data.linkedin }}" aria-label="LinkedIn">
      <i class="fab fa-linkedin fa-2x"></i>
    </a>
  {% endif %}
</p>
